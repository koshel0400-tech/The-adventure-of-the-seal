<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seal Hero: Imzulen Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001e3c; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #ui, #shop-ui, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; z-index: 10;
        }
        .stats-bar { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; }
        .stat { 
            background: rgba(0, 0, 0, 0.7); padding: 10px 15px; 
            border-radius: 15px; border: 2px solid #87CEEB; font-weight: bold; font-size: 18px;
        }
        #btn-shop {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            background: #FFD700; color: #000; padding: 12px 24px;
            border-radius: 15px; border: 3px solid #fff; font-weight: bold; cursor: pointer;
        }
        #shop-ui, #game-over {
            display: none; pointer-events: auto;
            background: rgba(0, 15, 30, 0.95); flex-direction: column; align-items: center; justify-content: center;
        }
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .skin-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; text-align: center; width: 115px; border: 3px solid transparent; }
        .skin-card.active { border-color: #FFD700; }
        .skin-btn { margin-top: 10px; padding: 10px; border-radius: 12px; border: none; width: 100%; font-weight: bold; background: #FFD700; cursor: pointer; pointer-events: auto; }
        .menu-btn { background: #FFD700; color: #000; padding: 15px 40px; border-radius: 20px; border: none; font-weight: bold; font-size: 20px; margin-top: 20px; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stats-bar">
        <div id="score-display" class="stat">🐟 0</div>
        <div id="lives-display" class="stat">❤️ 3</div>
    </div>
    <button id="btn-shop">МАГАЗИН</button>
</div>

<div id="shop-ui">
    <h1>МАГАЗИН</h1>
    <div id="shop-balance">Рыбки: 0</div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="menu-btn" onclick="closeShop()">НАЗАД</button>
</div>

<div id="game-over">
    <h1 style="font-size: 36px; color: #ff4444;">ТЮЛЕНЬ УТОНУЛ...</h1>
    <p id="final-score" style="font-size: 22px;">Счёт: 0</p>
    <button class="menu-btn" onclick="resetGame()">ИГРАТЬ СНОВА</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Загрузка данных
let totalFish = parseInt(localStorage.getItem('totalFish')) || 0;
let currentSkin = localStorage.getItem('currentSkin') || 'classic';
let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins')) || ['classic'];

const skins = {
    classic: { name: "Обычный", body: "#999999", face: "#999999", price: 0 },
    ice: { name: "Ледяной", body: "#E0FFFF", face: "#E0FFFF", price: 10 },
    night: { name: "Ночной", body: "#333333", face: "#333333", price: 25 },
    imzul: { name: "Имзюлень", body: "#8B4513", face: "#FFD700", price: 50 }
};

let width, height, score = 0, lives = 3;
let isGameOver = false, isShopOpen = false, isFalling = false;
let seal = { x: 0, y: 0, targetX: 0, animTimer: 0, angle: 0, dmg: 0 };
let objects = [];

// Звуковой движок (Web Audio API)
const Sfx = {
    ctx: null,
    init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(freq, type, dur) {
        this.init();
        const osc = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + dur);
        g.gain.setValueAtTime(0.1, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + dur);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
    }
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    seal.x = seal.targetX = width / 2;
    seal.y = height - 120;
}
window.addEventListener('resize', resize);
window.addEventListener('touchstart', (e) => { Sfx.init(); if(!isShopOpen) seal.targetX = e.touches[0].clientX; });
window.addEventListener('touchmove', (e) => { e.preventDefault(); if(!isShopOpen) seal.targetX = e.touches[0].clientX; }, {passive:false});
resize();

function resetGame() {
    score = 0; lives = 3; isGameOver = false; isFalling = false; objects = [];
    seal.y = height - 120; seal.angle = 0; seal.dmg = 0;
    document.getElementById('game-over').style.display = 'none';
    document.getElementById('score-display').innerText = `🐟 0`;
    document.getElementById('lives-display').innerText = `❤️ 3`;
}

function spawn() {
    if (isGameOver || isShopOpen) { setTimeout(spawn, 500); return; }
    const isOrca = Math.random() < 0.3;
    objects.push({ x: Math.random() * (width - 60) + 30, y: -80, type: isOrca ? 'orca' : 'fish', speed: isOrca ? 4+(score*0.1) : 3, rot: 0 });
    setTimeout(spawn, Math.max(400, 1000 - score * 10));
}

function drawSeal() {
    const s = skins[currentSkin];
    ctx.save();
    ctx.translate(seal.x, seal.y);
    ctx.rotate(seal.angle + Math.sin(seal.animTimer) * 0.05);

    let bodyC = seal.dmg > 0 ? "#ff0000" : s.body;
    let faceC = seal.dmg > 0 ? "#ff0000" : s.face;

    // Рисуем тюленя по частям
    ctx.fillStyle = bodyC;
    // Хвост
    ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(-60, -15); ctx.lineTo(-60, 15); ctx.fill();
    // Тело
    ctx.beginPath(); ctx.ellipse(0, 0, 45, 22, 0, 0, Math.PI * 2); ctx.fill();
    // Ласта
    ctx.beginPath(); ctx.ellipse(-20, 10, 15, 8, 0.5, 0, Math.PI * 2); ctx.fill();
    // Голова
    ctx.fillStyle = faceC;
    ctx.beginPath(); ctx.arc(38, -8, 18, 0, Math.PI * 2); ctx.fill();
    // Глаза
    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(46, -10, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(48, -10, 2, 0, Math.PI * 2); ctx.fill();

    if(seal.dmg > 0) seal.dmg--;
    ctx.restore();
}

function update() {
    ctx.clearRect(0, 0, width, height);
    const grad = ctx.createLinearGradient(0, 0, 0, height);
    grad.addColorStop(0, '#87CEEB'); grad.addColorStop(1, '#004a7c');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, width, height);

    if (!isGameOver && !isShopOpen) {
        seal.animTimer += 0.08;
        seal.x += (seal.targetX - seal.x) * 0.15;
        seal.angle = (seal.targetX - seal.x) * 0.005;

        for (let i = objects.length - 1; i >= 0; i--) {
            const o = objects[i];
            o.y += o.speed;
            if (o.type === 'fish') {
                ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.ellipse(o.x, o.y, 18, 10, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(o.x-12, o.y); ctx.lineTo(o.x-25, o.y-12); ctx.lineTo(o.x-25, o.y+12); ctx.fill();
                if (Math.hypot(o.x - seal.x, o.y - seal.y) < 45) {
                    score++; totalFish++;
                    Sfx.play(800, 'triangle', 0.15);
                    document.getElementById('score-display').innerText = `🐟 ${score}`;
                    objects.splice(i, 1);
                }
            } else {
                ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.rot += 0.02);
                ctx.fillStyle = '#222';
                ctx.beginPath(); ctx.ellipse(0, 0, 40, 20, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-15, -45); ctx.lineTo(-25, -5); ctx.fill(); // Плавник
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.ellipse(15, 5, 12, 5, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
                if (Math.hypot(o.x - seal.x, o.y - seal.y) < 50) {
                    lives--; seal.dmg = 15;
                    Sfx.play(120, 'square', 0.2);
                    document.getElementById('lives-display').innerText = `❤️ ${lives}`;
                    objects.splice(i, 1);
                    if (lives <= 0) { isGameOver = true; isFalling = true; localStorage.setItem('totalFish', totalFish); }
                }
            }
            if (o.y > height + 100) objects.splice(i, 1);
        }
    } else if (isFalling) {
        seal.y += 10; seal.angle += 0.25;
        if (seal.y > height + 150) {
            isFalling = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').innerText = `Счёт: ${score}`;
        }
    }
    drawSeal();
    requestAnimationFrame(update);
}

function updateShopUI() {
    const grid = document.getElementById('shop-grid');
    document.getElementById('shop-balance').innerText = `Рыбки: ${totalFish}`;
    grid.innerHTML = '';
    for (let id in skins) {
        const s = skins[id];
        const isOwned = ownedSkins.includes(id);
        const isActive = currentSkin === id;
        const card = document.createElement('div');
        card.className = `skin-card ${isActive ? 'active' : ''}`;
        card.innerHTML = `
            <div style="width:40px;height:20px;background:${s.body};margin:10px auto;border-radius:10px;border:2px solid ${s.face}"></div>
            <div style="font-size:12px;margin-bottom:5px;">${s.name}</div>
            <button class="skin-btn" onclick="buySkin('${id}')">${isActive?'Выбран':(isOwned?'Надеть':s.price)}</button>
        `;
        grid.appendChild(card);
    }
}

window.buySkin = (id) => {
    if (ownedSkins.includes(id)) {
        currentSkin = id;
    } else if (totalFish >= skins[id].price) {
        totalFish -= skins[id].price;
        ownedSkins.push(id);
        currentSkin = id;
        Sfx.play(600, 'sine', 0.3);
    }
    localStorage.setItem('totalFish', totalFish);
    localStorage.setItem('currentSkin', currentSkin);
    localStorage.setItem('ownedSkins', JSON.stringify(ownedSkins));
    updateShopUI();
};

document.getElementById('btn-shop').onclick = () => { isShopOpen = true; document.getElementById('shop-ui').style.display = 'flex'; updateShopUI(); };
window.closeShop = () => { isShopOpen = false; document.getElementById('shop-ui').style.display = 'none'; };

spawn();
update();
</script>
</body>
</html>
