<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seal Hero</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #001e3c; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }

        /* СТИЛИ ДЛЯ ОКНА АВТОРИЗАЦИИ / АККАУНТА */
        #auth-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 21, 0.85);
            display: none; justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(5px);
        }
        .auth-container {
            position: relative;
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.95) 0%, rgba(0, 10, 20, 0.9) 100%);
            padding: 35px 25px; border-radius: 24px; border: 3px solid #00d2ff;
            box-shadow: 0 0 30px rgba(0,210,255,0.4); width: 320px; text-align: center; color: white;
            box-sizing: border-box;
        }
        .auth-container h2 { margin-top: 0; color: #ffcc00; font-size: 28px; text-shadow: 0 0 10px rgba(255,204,0,0.5); }
        .auth-container p { font-size: 14px; color: #a0c0d0; font-family: Arial, sans-serif; line-height: 1.4; }
        .auth-input {
            width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #00d2ff;
            border-radius: 14px; background: #001428; color: white; font-size: 16px;
            box-sizing: border-box; text-align: center; font-family: Arial, sans-serif;
        }
        .auth-input:focus { outline: none; box-shadow: 0 0 10px #00d2ff; }
        .auth-btn {
            width: 100%; padding: 14px; background: linear-gradient(#FFD700, #FFA500);
            color: black; border: none; border-radius: 16px; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(255,215,0,0.3);
        }
        .auth-btn:disabled { background: #555; color: #aaa; box-shadow: none; cursor: not-allowed; }
        .auth-error { color: #ff4444; font-size: 13px; font-family: Arial, sans-serif; margin-top: -10px; margin-bottom: 10px; font-weight: bold; }
        
        /* Крестик закрытия окошка */
        .close-auth-btn {
            position: absolute; top: 12px; right: 18px; color: #a0c0d0; font-size: 28px;
            cursor: pointer; font-family: 'Arial', sans-serif; font-weight: bold; transition: 0.2s;
            user-select: none; -webkit-user-select: none;
        }
        .close-auth-btn:hover { color: #ff4444; }

        /* Класс для поочередного скрытия шагов */
        .hidden { display: none !important; }

        /* Стиль модельки тюленя для HTML */
        .seal-model { position: relative; width: 60px; height: 40px; }
        .seal-body { position: absolute; width: 60px; height: 35px; border-radius: 50% 50% 40% 40%; top: 5px; left: 0; }
        .seal-head { position: absolute; width: 30px; height: 30px; border-radius: 50%; top: -10px; left: 35px; }

        #ui, #shop-ui, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white; z-index: 10;
        }
        .stats-bar { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; }
        .stat {
            background: linear-gradient(135deg, rgba(0, 40, 80, 0.95) 0%, rgba(0, 10, 20, 0.9) 100%);
            padding: 12px 18px;
            border-radius: 16px; border: 3px solid #00d2ff; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 15px rgba(0,210,255,0.5);
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        #boost-indicator {
            display: none;
            color: #ffeb3b;
            font-size: 24px;
            text-shadow: 0 0 10px #ff9800;
            margin-top: 5px;
            animation: flash 0.5s infinite;
        }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Кнопки управления верхнего уровня */
        #btn-account {
            position: absolute; top: 20px; right: 180px; pointer-events: auto;
            background: linear-gradient(#00d2ff, #0066cc); color: #fff; padding: 15px 25px;
            border-radius: 20px; border: 3px solid #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,210,255,0.4); font-size: 16px;
        }
        #btn-shop {
            position: absolute; top: 20px; right: 20px; pointer-events: auto;
            background: linear-gradient(#FFD700, #FFA500); color: #000; padding: 15px 30px;
            border-radius: 20px; border: 3px solid #fff; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,215,0,0.4); font-size: 16px;
        }

        #shop-ui {
            display: none; pointer-events: auto;
            background: linear-gradient(180deg, rgba(0, 10, 25, 0.99) 0%, rgba(0, 5, 10, 0.98) 100%);
            flex-direction: column; align-items: center;
            overflow: hidden;
        }
        .shop-header { padding: 40px 20px 10px; text-align: center; flex-shrink: 0; }
        
        .shop-grid {
            flex: 1; width: 100%; overflow-y: auto; pointer-events: auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            padding: 10px 20px 140px; box-sizing: border-box; 
            -webkit-overflow-scrolling: touch; touch-action: pan-y;
        }
        
        .skin-card {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 28px;
            text-align: center; border: 4px solid rgba(255,255,255,0.1);
            transition: 0.3s; display: flex; flex-direction: column; align-items: center;
        }
        .skin-card.active { border-color: #00d2ff; background: rgba(0, 210, 255, 0.1); }
        .skin-btn { margin-top: 15px; padding: 12px; border-radius: 15px; border: none; width: 100%; font-weight: bold; background: #FFD700; color: #000; font-size: 14px; cursor: pointer; }
        .ability-text { font-size: 11px; color: #00d2ff; margin-top: 5px; min-height: 35px; pointer-events: none; }

        .extra-lives-btn {
            background: #ff4444; color: white; padding: 15px 30px; border-radius: 20px;
            margin-bottom: 20px; border: 3px solid white; font-weight: bold; cursor: pointer;
            flex-shrink: 0; pointer-events: auto;
        }

        .close-shop-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 15px 60px; border-radius: 30px; font-weight: bold; font-size: 20px; 
            box-shadow: 0 5px 15px rgba(255,255,255,0.2); pointer-events: auto;
            z-index: 20;
        }

        #game-over {
            display: none; pointer-events: auto;
            background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center;
        }
        .restart-btn { background: #00d2ff; color: #fff; padding: 20px 60px; border-radius: 30px; border: none; font-weight: bold; font-size: 26px; margin-top: 25px; box-shadow: 0 0 20px rgba(0,210,255,0.6); }
    </style>

    <!-- ИНИЦИАЛИЗАЦИЯ EMAILJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // ВСТАВЛЕН ВАШ КЛЮЧ ИЗ ЛИЧНОГО КАБИНЕТА EMAILJS
            emailjs.init("sOJzfGsV2tIPSxlS-");
        })();
    </script>
</head>
<body>

<!-- ОКНО АВТОРИЗАЦИИ / АККАУНТА (НЕОБЯЗАТЕЛЬНОЕ, С КРЕСТИКОМ) -->
<div id="auth-overlay">
    <!-- Шаг 1: Ввод почты -->
    <div id="email-step" class="auth-container">
        <div class="close-auth-btn" onclick="closeAuthModal()">&times;</div>
        <h2>Seal Hero 🦭</h2>
        <p>Введите ваш Email, чтобы получить секретный passcode для входа в игру:</p>
        <input type="email" id="user-email" class="auth-input" placeholder="example@mail.com" required>
        <button id="send-btn" class="auth-btn" onclick="sendAuthCode()">Получить код</button>
    </div>

    <!-- Шаг 2: Ввод кода подтверждения (По очереди после Шага 1) -->
    <div id="code-step" class="auth-container hidden">
        <div class="close-auth-btn" onclick="closeAuthModal()">&times;</div>
        <h2>Проверка кода 🦭</h2>
        <p>Мы отправили секретный passcode на вашу почту. Введите его для авторизации:</p>
        <input type="text" id="auth-code" class="auth-input" placeholder="Введите код" maxlength="4">
        <div id="auth-error-msg" class="auth-error"></div>
        <button class="auth-btn" onclick="verifyAuthCode()">Войти в игру</button>
    </div>
</div>

<div id="ui">
    <div class="stats-bar">
        <div id="score-display" class="stat">🐟 0</div>
        <div id="best-display" class="stat" onclick="handleTopClick()">🏆 ТОП: 0</div>
        <div id="lives-display" class="stat">❤️ 3</div>
        <div id="boost-indicator">BOOST! ⚡</div>
    </div>
    <button id="btn-account" onclick="openAuthModal()">АККАУНТ</button>
    <button id="btn-shop">МАГАЗИН</button>
</div>

<div id="shop-ui">
    <div class="shop-header">
        <h1 style="color: #FFD700; margin: 0; font-size: 36px;">МАГАЗИН</h1>
        <div id="shop-balance" style="font-size: 20px; opacity: 0.8;">Рыбки: 0</div>
    </div>
    <div id="life-buy-section" style="padding: 10px; flex-shrink: 0; display: flex; gap: 10px; justify-content: center;">
        <button class="extra-lives-btn" onclick="buyLife()">+1 ❤️ (350 🐟)</button>
    </div>
    <div class="shop-grid" id="shop-grid"></div>
    <button class="close-shop-btn" onclick="closeShop()">ВЫХОД</button>
</div>

<div id="game-over">
    <h1 style="color: #ff4444; font-size: 45px; margin: 0; text-align: center;">ИГРА ОКОНЧЕНА</h1>
    <p id="final-score" style="font-size: 30px; margin: 15px 0;">Счёт: 0</p>
    <button class="restart-btn" onclick="resetGame()">ЗАНОВО</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ АВТОРИЗАЦИИ
let generatedPasscode = null;
let isAuthorized = localStorage.getItem('isAuthorized') === 'true';

function openAuthModal() {
    isShopOpen = true; // Ставим игру на паузу, пока открыто окно
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('email-step').classList.remove('hidden');
    document.getElementById('code-step').classList.add('hidden');
    document.getElementById('auth-error-msg').innerText = '';
}

function closeAuthModal() {
    isShopOpen = false; // Возвращаем игру в активное состояние
    document.getElementById('auth-overlay').style.display = 'none';
}

function sendAuthCode() {
    const emailInput = document.getElementById('user-email');
    const email = emailInput.value.trim();
    const sendBtn = document.getElementById('send-btn');
    
    if (email === "" || !email.includes("@")) {
        alert("Пожалуйста, введите корректный Email!");
        return;
    }

    sendBtn.disabled = true;
    sendBtn.innerText = "Отправка...";

    generatedPasscode = Math.floor(1000 + Math.random() * 9000).toString();

    const templateParams = {
        to_email: email,       
        passcode: generatedPasscode
    };

    emailjs.send("service_xond4or", "template_okbl07i", templateParams)
        .then(function(response) {
            console.log('Код отправлен!', response.status, response.text);
            document.getElementById('email-step').classList.add('hidden');
            document.getElementById('code-step').classList.remove('hidden');
            sendBtn.disabled = false;
            sendBtn.innerText = "Получить код";
        }, function(error) {
            console.error('Ошибка EmailJS:', error);
            alert('Ошибка при отправке! Проверьте интернет-соединение.');
            sendBtn.disabled = false;
            sendBtn.innerText = "Получить код";
        });
}

function verifyAuthCode() {
    const userCode = document.getElementById('auth-code').value.trim();
    const errorMsg = document.getElementById('auth-error-msg');

    if (userCode === generatedPasscode) {
        isAuthorized = true;
        localStorage.setItem('isAuthorized', 'true');
        alert("Авторизация прошла успешно! 🎉");
        closeAuthModal();
    } else {
        errorMsg.innerText = "Неверный passcode! Попробуйте ещё раз.";
    }
}

// ИСХОДНЫЙ КОД ИГРЫ С КРАСИВЫМ ФОНОМ И АГРЕССИВНЫМИ КОСАТКАМИ
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let totalFish = parseInt(localStorage.getItem('totalFish')) || 0;
let highScore = parseInt(localStorage.getItem('highScore')) || 0;
let currentSkin = localStorage.getItem('currentSkin') || 'classic';
let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins')) || ['classic'];
let purchasedExtraLives = parseInt(localStorage.getItem('extraLives')) || 0;
let topClicks = 0;
let lastClickTime = 0;

let cyborgBlockCounter = 0;

const skins = {
    classic: { name: "Серый", body: "#9e9e9e", head: "#9e9e9e", dark: "#606060", text: "", price: 0, ability: "Нет" },
    ice: { name: "Снежок", body: "#f0faff", head: "#f0faff", dark: "#a0c0d0", text: "", price: 10, ability: "Нет" },
    imzul: { name: "Имзюлень", body: "#8b4513", head: "#ffd700", dark: "#5d2e0d", text: "Им", price: 50, ability: "Магнит (радиус +20%)" },
    egor: { name: "Егор", body: "#8b4513", head: "#8b4513", dark: "#5d2e0d", text: "Егор", price: 200, ability: "Броня (шанс 10% на блок)" },
    bogdan: { name: "Богдан", body: "#333", head: "#333", dark: "#111", text: "Богдан", price: 200, ability: "Умелые ласты (+30% быстроты)" },
    ghost: { name: "Призрак", body: "rgba(200,230,255,0.4)", head: "rgba(200,230,255,0.5)", dark: "rgba(150,180,210,0.3)", text: "👻", price: 350, ability: "Неосязаемость (15% шанс пройти сквозь косатку)" },
    pirate: { name: "Пират", body: "#5c4033", head: "#2b1d0c", dark: "#1a1105", text: "🏴‍☠️", price: 400, ability: "Острый крюк (магнит +40%)" },
    cyborg: { name: "Киборг", body: "#708090", head: "#c0c0c0", dark: "#4682b4", text: "🤖", price: 600, ability: "Энергощит (блокирует каждый 2-й удар)" },
    neon: { name: "Неон", body: "#ff00ff", head: "#00ffff", dark: "#333", text: "Neon", price: 500, ability: "Сияние (рыбки чаще)" },
    lava: { name: "Лава", body: "#ff4500", head: "#ff8c00", dark: "#800000", text: "Lava", price: 1000, ability: "Жар (враги медленнее)" },
    ghost_gold: { name: "Золотой", body: "#ffd700", head: "#fff8dc", dark: "#b8860b", text: "👑", price: 1500, ability: "Золотая лихорадка (шанс на х2-х5 рыбок)" },
    shadow: { name: "Тень", body: "#1a1a1a", head: "#0d0d0d", dark: "#000000", text: "🥷", price: 2000, ability: "Замедление времени (косатки на 25% медленнее)" },
    cosmo: { name: "Космос", body: "#4b0082", head: "#9370db", dark: "#000033", text: "Stars", price: 2500, ability: "Телепорт (быстрота)" },
    diamond: { name: "Алмаз", body: "#b9f2ff", head: "#e0ffff", dark: "#70d1e8", text: "💎", price: 5000, ability: "Удача (х2 рыбки)" },
    god: { name: "Бог Морей", body: "#00d2ff", head: "#ffffff", dark: "#008080", text: "GOD", price: 10000, ability: "Бессмертие (30% щит)" }
};

let width, height, score = 0, lives = 3 + purchasedExtraLives;
let isGameOver = false, isShopOpen = false, isFalling = false;
let seal = { x: 0, y: 0, targetX: 0, animTimer: 0, angle: 0, dmg: 0 };
let objects = [];
let particles = [];
let boostActive = false;
let boostTimer = 0;
let lastScoreForBoost = 0;

let keys = {};
let seaweeds = [];
let planktons = [];

function handleTopClick() {
    let now = Date.now();
    if (now - lastClickTime > 1000) topClicks = 0;
    topClicks++;
    lastClickTime = now;
    if (topClicks >= 3) {
        totalFish += 500;
        localStorage.setItem('totalFish', totalFish);
        topClicks = 0;
    }
}

const Sfx = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    playFish() {
        this.init();
        let osc = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
        g.gain.setValueAtTime(0.2, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.1);
    },
    playHit() {
        this.init();
        let osc = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.3, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.2);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    },
    playBoost() {
        this.init();
        let osc = this.ctx.createOscillator();
        let g = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, this.ctx.currentTime + 0.5);
        g.gain.setValueAtTime(0.1, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
        osc.connect(g); g.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + 0.5);
    }
};

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    seal.x = seal.targetX = width / 2;
    seal.y = height - 130;
    document.getElementById('best-display').innerText = `🏆 ТОП: ${highScore}`;
    
    seaweeds = [];
    for(let i = 0; i < 12; i++) {
        let depth = Math.random();
        seaweeds.push({
            x: Math.random() * width,
            y: height + 20,
            height: Math.random() * 160 + 90,
            waveSpeed: Math.random() * 0.015 + 0.01,
            offset: Math.random() * 100,
            width: Math.random() * 15 + 15,
            color: `rgba(0, ${Math.floor(depth * 50 + 40)}, ${Math.floor(depth * 30 + 30)}, ${depth * 0.3 + 0.15})`
        });
    }

    planktons = [];
    for(let i = 0; i < 20; i++) {
        planktons.push({
            x: Math.random() * width,
            y: Math.random() * height,
            speed: Math.random() * 0.5 + 0.2,
            size: Math.random() * 2 + 1,
            pulseOffset: Math.random() * Math.PI,
            color: Math.random() < 0.5 ? 'rgba(0, 210, 255, 0.3)' : 'rgba(0, 255, 180, 0.25)'
        });
    }
}

window.addEventListener('resize', resize);
window.addEventListener('touchstart', (e) => { 
    Sfx.init(); 
    if(!isShopOpen) seal.targetX = e.touches[0].clientX; 
});
window.addEventListener('touchmove', (e) => { 
    if(!isShopOpen) {
        e.preventDefault(); 
        seal.targetX = e.touches[0].clientX; 
    }
}, {passive:false});

window.addEventListener('mousemove', (e) => {
    if (!isShopOpen) {
        seal.targetX = e.clientX;
    }
});

window.addEventListener('click', () => { Sfx.init(); });
window.addEventListener('keydown', (e) => { keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

resize();

function spawnBubble(x, y) {
    for(let i=0; i<6; i++) {
        particles.push({ x: x, y: y, vx: (Math.random()-0.5)*5, vy: -Math.random()*4-2, r: Math.random()*4+2, alpha: 1 });
    }
}

function resetGame() {
    score = 0; lives = 3 + purchasedExtraLives; isGameOver = false; isFalling = false; objects = []; particles = [];
    boostActive = false; boostTimer = 0; lastScoreForBoost = 0; cyborgBlockCounter = 0;
    seal.y = height - 130; seal.angle = 0; seal.dmg = 0;
    document.getElementById('game-over').style.display = 'none';
    document.getElementById('boost-indicator').style.display = 'none';
    document.getElementById('score-display').innerText = `🐟 0`;
    document.getElementById('lives-display').innerText = `❤️ ${lives}`;
}

function spawn() {
    if (isGameOver || isShopOpen) { setTimeout(spawn, 500); return; }
    let chanceOrca = boostActive ? 0.1 : 0.35;
    if (currentSkin === 'neon' && Math.random() < 0.15) {
        chanceOrca = Math.max(0.05, chanceOrca - 0.1);
    }
    
    const rand = Math.random();
    if (rand < chanceOrca) {
        const isAngry = Math.random() < 0.40;
        objects.push({
            x: Math.random() * (width - 80) + 40,
            y: -100,
            type: isAngry ? 'angry_orca' : 'orca',
            speed: 4.5 + (score * 0.05),
            rot: Math.random() * Math.PI * 2,
            angle: Math.PI / 2
        });
    } else {
        objects.push({ x: Math.random() * (width - 80) + 40, y: -100, type: 'fish', speed: 4, rot: Math.random() * Math.PI * 2 });
    }

    let spawnDelay = boostActive ? 300 : Math.max(400, 1000 - score * 10);
    setTimeout(spawn, spawnDelay);
}

function buyLife() {
    if (purchasedExtraLives < 10) {
        if (totalFish >= 350) {
            totalFish -= 350; purchasedExtraLives++;
            localStorage.setItem('totalFish', totalFish);
            localStorage.setItem('extraLives', purchasedExtraLives);
            lives = 3 + purchasedExtraLives;
            document.getElementById('lives-display').innerText = `❤️ ${lives}`;
            updateShopUI();
        }
    }
}

function drawSeal() {
    const s = skins[currentSkin];
    ctx.save();
    ctx.translate(seal.x, seal.y);
    ctx.rotate(seal.angle);
    let bodyCol = seal.dmg > 0 ? "#ff0000" : s.body;
    let headCol = seal.dmg > 0 ? "#ff0000" : s.head;
    let darkCol = s.dark;
    let swim = Math.sin(seal.animTimer * 2.5);
    ctx.fillStyle = darkCol; ctx.beginPath(); ctx.moveTo(-40, swim*4); ctx.bezierCurveTo(-65,-30+swim*10,-85,-15,-80,0); ctx.bezierCurveTo(-85,15,-65,30+swim*10,-40,swim*4); ctx.fill();
    ctx.fillStyle = bodyCol; ctx.beginPath(); ctx.ellipse(0, 0, 62, 35, 0, 0, Math.PI * 2); ctx.fill();
    if (s.text) { ctx.fillStyle = "white"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center"; ctx.fillText(s.text, 0, 6); }
    ctx.save(); ctx.translate(-5, 15); ctx.rotate(swim*0.5); ctx.fillStyle = darkCol; ctx.beginPath(); ctx.ellipse(0, 0, 30, 16, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.fillStyle = headCol; ctx.beginPath(); ctx.arc(52, -15, 30, 0, Math.PI * 2); ctx.fill();
    ctx.save(); ctx.translate(52, -15);
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(14, -12, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(17, -12, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#000"; ctx.beginPath(); ctx.ellipse(26, 6, 9, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(28, 4, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    if(seal.dmg > 0) seal.dmg--;
    ctx.restore();
}

function update() {
    ctx.clearRect(0, 0, width, height);
    const g = ctx.createLinearGradient(0,0,0,height);
    g.addColorStop(0, boostActive ? '#ff9800' : '#4facfe');
    g.addColorStop(1, '#001e3c');
    ctx.fillStyle = g; ctx.fillRect(0,0,width,height);

    ctx.save();
    for(let i = 0; i < seaweeds.length; i++) {
        let sw = seaweeds[i];
        let wave = Math.sin(seal.animTimer * 1.5 + sw.offset) * 25;
        ctx.fillStyle = sw.color;
        ctx.beginPath();
        ctx.moveTo(sw.x, sw.y);
        ctx.quadraticCurveTo(sw.x + wave, sw.y - sw.height / 2, sw.x + wave * 0.7, sw.y - sw.height);
        ctx.quadraticCurveTo(sw.x + wave + sw.width, sw.y - sw.height / 2, sw.x + sw.width, sw.y);
        ctx.closePath();
        ctx.fill();
    }
    ctx.restore();

    ctx.save();
    for(let i = 0; i < planktons.length; i++) {
        let pk = planktons[i];
        pk.y -= pk.speed;
        pk.x += Math.sin(seal.animTimer * 0.5 + pk.pulseOffset) * 0.2;
        
        if (pk.y < -10) {
            pk.y = height + 10;
            pk.x = Math.random() * width;
        }
        
        let alphaPulse = (Math.sin(seal.animTimer + pk.pulseOffset) * 0.3 + 0.7);
        ctx.fillStyle = pk.color;
        ctx.beginPath();
        ctx.arc(pk.x, pk.y, pk.size * alphaPulse, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    if(Math.random() < 0.03) {
        particles.push({ x: Math.random() * width, y: height + 10, vx: (Math.random() - 0.5) * 2, vy: -Math.random() * 2 - 1, r: Math.random() * 4 + 1, alpha: 0.7 });
    }

    for(let i=particles.length-1; i>=0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.01;
        ctx.fillStyle = `rgba(255,255,255,${p.alpha})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        if(p.alpha <= 0) particles.splice(i,1);
    }

    if (!isGameOver && !isShopOpen) {
        seal.animTimer += 0.08;

        let keyboardSpeed = 15;
        if (keys['ArrowLeft'] || keys['KeyA']) { seal.targetX = Math.max(40, seal.targetX - keyboardSpeed); }
        if (keys['ArrowRight'] || keys['KeyD']) { seal.targetX = Math.min(width - 40, seal.targetX + keyboardSpeed); }

        let lerpFactor = currentSkin === 'bogdan' ? 0.195 : 0.15;
        if(currentSkin === 'cosmo') lerpFactor = 0.22;
        seal.x += (seal.targetX - seal.x) * lerpFactor;
        seal.angle = (seal.targetX - seal.x) * 0.005;

        if (score > 0 && score % 50 === 0 && score !== lastScoreForBoost) {
            boostActive = true; boostTimer = 300; lastScoreForBoost = score; Sfx.playBoost();
            document.getElementById('boost-indicator').style.display = 'block';
        }
        if (boostActive) { boostTimer--; if (boostTimer <= 0) { boostActive = false; document.getElementById('boost-indicator').style.display = 'none'; } }

        for (let i = objects.length - 1; i >= 0; i--) {
            const o = objects[i];
            let speedMod = 1; 
            if((o.type === 'orca' || o.type === 'angry_orca') && currentSkin === 'lava') speedMod = 0.85;
            if((o.type === 'orca' || o.type === 'angry_orca') && currentSkin === 'shadow') speedMod = 0.75;
            
            if (o.type === 'angry_orca') {
                const isVisible = o.y < height;
                if (isVisible) {
                    let targetAngle = Math.atan2(seal.y - o.y, seal.x - o.x);
                    let angleDiff = targetAngle - o.angle;
                    angleDiff = Math.atan2(Math.sin(angleDiff), Math.cos(angleDiff));
                    let rotationSpeed = 0.015;
                    o.angle += Math.max(-rotationSpeed, Math.min(rotationSpeed, angleDiff));
                }
                o.x += Math.cos(o.angle) * o.speed * speedMod;
                o.y += Math.sin(o.angle) * o.speed * speedMod;
            } else {
                o.y += o.speed * speedMod;
            }

            if (o.type === 'fish') {
                ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(Math.sin(seal.animTimer + o.rot) * 0.2);
                let fishGrad = ctx.createRadialGradient(0,0,5,0,0,22); fishGrad.addColorStop(0, '#fff3a0'); fishGrad.addColorStop(1, '#ffcc00');
                ctx.fillStyle = fishGrad; ctx.beginPath(); ctx.ellipse(0, 0, 22, 13, 0, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(8, -5, 10, 0.5, 2); ctx.stroke();
                ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.moveTo(-18, 0); ctx.lineTo(-35, -15); ctx.lineTo(-35, 15); ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(12, -3, 2, 0, Math.PI*2); ctx.fill();
                ctx.restore();
                
                let grabRadius = 55;
                if (currentSkin === 'imzul') grabRadius = 66;
                if (currentSkin === 'pirate') grabRadius = 77;
                
                if (Math.hypot(o.x - seal.x, o.y - seal.y) < grabRadius) {
                    let reward = 1;
                    if (currentSkin === 'diamond') { reward = 2; } 
                    else if (currentSkin === 'ghost_gold') { reward = Math.floor(Math.random() * 4) + 2; }
                    
                    score += reward; totalFish += reward; Sfx.playFish(); spawnBubble(o.x, o.y);
                    document.getElementById('score-display').innerText = `🐟 ${score}`;
                    if (score > highScore) { highScore = score; localStorage.setItem('highScore', highScore); document.getElementById('best-display').innerText = `🏆 ТОП: ${highScore}`; }
                    objects.splice(i, 1);
                }
            } else if (o.type === 'orca' || o.type === 'angry_orca') {
                ctx.save(); 
                ctx.translate(o.x, o.y);
                if (o.type === 'angry_orca') { ctx.rotate(o.angle - Math.PI / 2); }
                ctx.scale(1.4, 1.4); 
                ctx.fillStyle = o.type === 'angry_orca' ? '#1c0d12' : '#111';
                ctx.beginPath(); ctx.ellipse(0, 0, 55, 28, 0, 0, Math.PI * 2); ctx.fill();
                
                if (o.type === 'angry_orca') {
                    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-12, -40); ctx.lineTo(-18, -38); ctx.lineTo(-20, -50); ctx.lineTo(-40, 0); ctx.fill();
                } else {
                    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-25, -60); ctx.lineTo(-40, 0); ctx.fill();
                }
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(25, 8, 20, 10, 0, 0, Math.PI * 2); ctx.fill();
                ctx.restore();

                let canAttack = true;
                if (o.type === 'angry_orca' && o.y >= height) { canAttack = false; }

                if (canAttack && Math.hypot(o.x - seal.x, o.y - seal.y) < 70) {
                    let passThrough = currentSkin === 'ghost' && Math.random() < 0.15;
                    if (passThrough) { seal.dmg = 10; } 
                    else {
                        let armorChance = currentSkin === 'god' ? 0.3 : (currentSkin === 'egor' ? 0.1 : 0);
                        let isBlockedByCyborg = false;
                        if (currentSkin === 'cyborg') {
                            cyborgBlockCounter++;
                            if (cyborgBlockCounter % 2 === 0) isBlockedByCyborg = true;
                        }
                        if (Math.random() < armorChance || isBlockedByCyborg) { seal.dmg = 15; } 
                        else {
                            lives--; seal.dmg = 30; Sfx.playHit();
                            document.getElementById('lives-display').innerText = `❤️ ${lives}`;
                        }
                    }
                    objects.splice(i, 1);
                    if (lives <= 0) { isGameOver = true; isFalling = true; localStorage.setItem('totalFish', totalFish); }
                }
            }
            if (o.y > height + 150) objects.splice(i, 1);
        }
    } else if (isFalling) {
        seal.y += 20; seal.angle += 0.2;
        if (seal.y > height + 300) { isFalling = false; document.getElementById('game-over').style.display = 'flex'; document.getElementById('final-score').innerText = `Счёт: ${score}`; }
    }
    drawSeal();
    requestAnimationFrame(update);
}

function updateShopUI() {
    const grid = document.getElementById('shop-grid');
    document.getElementById('shop-balance').innerText = `Рыбки: ${totalFish}`;
    grid.innerHTML = '';
    for (let id in skins) {
        const s = skins[id]; const isOwned = ownedSkins.includes(id); const isActive = currentSkin === id;
        const card = document.createElement('div'); card.className = `skin-card ${isActive ? 'active' : ''}`;
        card.innerHTML = `
            <div class="seal-model">
                <div class="seal-body" style="background:${s.body}"></div>
                <div class="seal-head" style="background:${s.head}"></div>
            </div>
            <div style="font-weight:bold;margin-top:15px;color:#fff;">${s.name}</div>
            <div class="ability-text">${s.ability}</div>
            <button class="skin-btn" onclick="buySkin('${id}')">${isActive?'Надето':(isOwned?'Выбрать':s.price+' 🐟')}</button>
        `;
        grid.appendChild(card);
    }
}

window.buySkin = (id) => {
    if (ownedSkins.includes(id)) { currentSkin = id; }
    else if (totalFish >= skins[id].price) { totalFish -= skins[id].price; ownedSkins.push(id); currentSkin = id; }
    localStorage.setItem('totalFish', totalFish); localStorage.setItem('currentSkin', currentSkin); localStorage.setItem('ownedSkins', JSON.stringify(ownedSkins));
    updateShopUI();
};

document.getElementById('btn-shop').onclick = () => { isShopOpen = true; document.getElementById('shop-ui').style.display = 'flex'; updateShopUI(); };
window.closeShop = () => { isShopOpen = false; document.getElementById('shop-ui').style.display = 'none'; };

resize(); spawn(); update();
</script>
</body>
